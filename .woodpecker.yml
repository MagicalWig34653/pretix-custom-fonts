when:
  - event: [push, tag, manual]

steps:
  - name: docker-build-push
    image: woodpeckerci/plugin-docker-buildx:latest
    settings:
      registry: ghcr.io
      repo: ghcr.io/magicalwig34653/pretix-modify-custom-fonts
      dockerfile: Dockerfile
      context: .
      platforms:
        - linux/amd64
      push: true
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_token
      tags:
        - ${CI_COMMIT_SHA}
        - latest
        - stable